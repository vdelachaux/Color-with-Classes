name: Build

on:
  push:
    paths:
      - '**.4dm'
      - '**.yml'
  pull_request:
    paths:
      - '**.4dm'
  workflow_dispatch:

jobs:
  build:
    name: "Build on ${{ matrix.os }}"
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, windows-latest ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

#       # Get dependencies
#       - name: Get SVG with Classes
#         uses: actions/checkout@v4
#         with:
#           repository: vdelachaux/SVG-with-Classes
#           path: Components/SVG with Classes.4dbase

      - name: Build
        uses: ./.github/actions/4d-build
        with:
          token: ${{ secrets.DLTK }}
